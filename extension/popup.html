<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <style>
    :root { color-scheme: light; }
    body {
      width: 268px;
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #1f2230;
      background: #fff;
    }
    .title { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
    .dot { width: 18px; height: 18px; border-radius: 6px; background: #4f46e5; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 10px 0; font-size: 13px; }
    .muted { color: #6b6f7d; }
    .hr { height: 1px; background: #eceef2; margin: 12px 0; border: 0; }
    .switch { position: relative; width: 40px; height: 22px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #d4d6de; border-radius: 999px; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: .2s; }
    input:checked + .slider { background: #4f46e5; }
    input:checked + .slider::before { transform: translateX(18px); }
    .site { font-weight: 600; word-break: break-all; }
    .btn {
      padding: 5px 10px; font-size: 12px; font-weight: 600; white-space: nowrap;
      color: #4f46e5; background: rgba(79,70,229,.1); border: 1px solid rgba(79,70,229,.25);
      border-radius: 8px; cursor: pointer; flex: none;
    }
    .btn:hover { background: rgba(79,70,229,.16); }
    .btn:disabled { opacity: .5; cursor: default; }
    .btn-remove { color: #b4332c; background: rgba(180,51,44,.08); border-color: rgba(180,51,44,.22); }
    .btn-remove:hover { background: rgba(180,51,44,.14); }
    .section-label { font-size: 12px; color: #6b6f7d; margin: 6px 0 4px; }
    .list { display: flex; flex-direction: column; gap: 6px; max-height: 160px; overflow-y: auto; }
    .item { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; padding: 5px 8px; border: 1px solid #eceef2; border-radius: 8px; }
    .item span { word-break: break-all; }
    .item .x { cursor: pointer; color: #b4332c; font-weight: 700; padding: 0 4px; flex: none; }
    .empty { font-size: 12px; color: #9aa0ac; font-style: italic; padding: 4px 0; }
    .refresh { width: 100%; margin-top: 12px; padding: 8px; }
    .stat { font-variant-numeric: tabular-nums; font-weight: 600; }
  </style>
</head>
<body>
  <div class="title"><span class="dot"></span>WordBread 高亮</div>

  <div class="row">
    <span>总开关</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <hr class="hr" />

  <div class="row">
    <span class="site" id="site">—</span>
    <button class="btn" id="siteBtn" disabled>在本站禁用</button>
  </div>

  <div class="section-label">黑名单（这些站点不高亮）</div>
  <div class="list" id="list"></div>

  <hr class="hr" />

  <div class="row muted"><span>已收录</span><span class="stat" id="count">—</span></div>
  <div class="row muted"><span>本页命中</span><span class="stat" id="hits">—</span></div>

  <button class="btn refresh" id="refresh">刷新词表</button>

  <script src="popup.js"></script>
</body>
</html>
